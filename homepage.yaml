---
apiVersion: v1
kind: Namespace
metadata:
  name: homepage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: homepage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "nodes", "services", "endpoints"]
    verbs: ["get", "list"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes", "gateways"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab
    theme: dark
    color: slate
    headerStyle: clean
    layout:
      Infrastructure:
        style: row
        columns: 3
      Media:
        style: row
        columns: 4
      Downloads:
        style: row
        columns: 2

  bookmarks.yaml: |
    []

  widgets.yaml: |
    - greeting:
        text_size: xl
        text: Welcome back
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: short
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: talos-cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true

  services.yaml: |
    - Infrastructure:
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.talos-cluster.local.obleey.com
            description: Distributed block storage
            namespace: longhorn-system
            app: longhorn-ui
        - ArgoCD:
            icon: argocd.png
            href: https://argocd.talos-cluster.local.obleey.com
            description: GitOps continuous delivery
        - Kubeseal:
            icon: kubernetes.png
            href: https://kubeseal.talos-cluster.local.obleey.com
            description: Sealed secrets UI

    - Media:
        - Radarr:
            icon: radarr.png
            href: https://radarr.talos-cluster.local.obleey.com
            description: Movie management
            widget:
              type: radarr
              url: https://radarr.talos-cluster.local.obleey.com
              key: ad6569c110044da2bc1e7d5f40d9a5e2
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.talos-cluster.local.obleey.com
            description: TV show management
            widget:
              type: sonarr
              url: https://sonarr.talos-cluster.local.obleey.com
              key: 4b53ed0cd1c64312a24457f789cf6d8d
        - Bazarr:
            icon: bazarr.png
            href: https://bazarr.talos-cluster.local.obleey.com
            description: Subtitle management
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.talos-cluster.local.obleey.com
            description: Indexer management
            widget:
              type: prowlarr
              url: https://prowlarr.talos-cluster.local.obleey.com
              key: 889dec906bcc4fbe86ed5674842fc6e7

    - Downloads:
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qbittorrent.talos-cluster.local.obleey.com
            description: Torrent client
            widget:
              type: qbittorrent
              url: https://qbittorrent.talos-cluster.local.obleey.com
        - Unpackerr:
            icon: unpackerr.png
            href: https://unpackerr.talos-cluster.local.obleey.com
            description: Archive extractor

  kubernetes.yaml: |
    mode: cluster

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          ports:
            - containerPort: 3000
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "homepage.talos-cluster.local.obleey.com"
          volumeMounts:
            - name: config
              mountPath: /app/config
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: homepage
spec:
  selector:
    app: homepage
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: homepage
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "homepage.talos-cluster.local.obleey.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: homepage
          port: 3000
          weight: 1
