fullnameOverride: technitium-secondary

controllers:
  main:
    type: deployment
    containers:
      main:
        image:
          repository: technitium/dns-server
          tag: "15.3.0"
        env:
          DNS_SERVER_DOMAIN: technitium-secondary
          TZ: Europe/Ljubljana

service:
  app:
    controller: main
    ports:
      http:
        port: 5380

persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: technitium-secondary-config
    globalMounts:
      - path: /etc/dns
  tls:
    type: secret
    name: technitium-cluster-tls
    globalMounts:
      - path: /etc/dns/certs
        readOnly: true
