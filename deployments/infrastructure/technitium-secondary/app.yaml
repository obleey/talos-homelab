apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: technitium-secondary
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      targetRevision: 5.0.1
      helm:
        valueFiles:
          - $values/deployments/infrastructure/technitium-secondary/technitium-values.yaml
    - repoURL: https://github.com/obleey/talos-homelab
      targetRevision: HEAD
      ref: values
      path: deployments/infrastructure/technitium-secondary
      directory:
        exclude: "{app.yaml,technitium-values.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: technitium-secondary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
