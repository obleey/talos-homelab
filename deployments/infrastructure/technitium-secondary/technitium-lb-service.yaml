apiVersion: v1
kind: Service
metadata:
  name: technitium-secondary-dns
  namespace: technitium-secondary
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: technitium-secondary
    app.kubernetes.io/name: technitium-secondary
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
