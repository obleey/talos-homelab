pod:
  kind: 'Deployment'

ingress:
  enabled: true
  gatewayAPI:
    enabled: true
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
        sectionName: websecure

persistence:
  enabled: true
  storageClass: longhorn
  accessModes:
    - ReadWriteOnce
  size: 1Gi

secret:
  additionalSecrets:
    authelia-secrets: {}
    authelia-users: {}
    authelia-oidc: {}

configMap:
  server:
    endpoints:
      authz:
        forward-auth:
          implementation: 'ForwardAuth'
          authn_strategies:
            - name: 'HeaderProxyAuthorization'
              schemes:
                - 'Basic'
            - name: 'CookieSession'

  authentication_backend:
    file:
      enabled: true
      path: '/secrets/authelia-users/users_database.yml'

  access_control:
    default_policy: 'deny'
    rules:
      # two_factor here bootstraps 2FA enrollment: Authelia only lets a user
      # register a second factor device when at least one protected resource
      # actually requires it.
      - domain: 'kubeseal.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'traefik.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'hub.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'grafana.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      # arr-stack apps: their own /api/* stays protected by each app's API key
      # and is bypassed here so service-to-service and API-key integrations
      # aren't forced through an interactive login; only the browser UI is gated.
      - domain: 'sonarr.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'sonarr.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'radarr.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'radarr.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'bazarr.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'bazarr.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'prowlarr.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'prowlarr.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'clonarr.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'clonarr.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'qb.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'qb.talos-cluster.local.obleey.com'
        policy: 'two_factor'
      - domain: 'seerr.talos-cluster.local.obleey.com'
        policy: 'bypass'
        resources:
          - '^/api(?:/.*)?$'
      - domain: 'seerr.talos-cluster.local.obleey.com'
        policy: 'two_factor'

  session:
    cookies:
      - subdomain: 'auth'
        domain: 'talos-cluster.local.obleey.com'
    encryption_key:
      secret_name: 'authelia-secrets'
      path: 'session.encryption.key'

  storage:
    local:
      enabled: true
    encryption_key:
      secret_name: 'authelia-secrets'
      path: 'storage.encryption.key'

  identity_validation:
    reset_password:
      secret:
        secret_name: 'authelia-secrets'
        path: 'identity_validation.reset_password.jwt.hmac.key'

  notifier:
    filesystem:
      enabled: true

  identity_providers:
    oidc:
      enabled: true
      hmac_secret:
        secret_name: 'authelia-oidc'
        path: 'hmac.key'
      jwks:
        - key_id: 'grafana-rsa'
          algorithm: 'RS256'
          use: 'sig'
          key:
            path: '/secrets/authelia-oidc/rsa.private.pem'
      clients:
        - client_id: 'grafana'
          client_name: 'Grafana'
          client_secret:
            path: '/secrets/authelia-oidc/grafana.client-secret.hash'
          redirect_uris:
            - 'https://grafana.talos-cluster.local.obleey.com/login/generic_oauth'
          scopes:
            - 'openid'
            - 'profile'
            - 'email'
            - 'groups'
          grant_types:
            - 'authorization_code'
          response_types:
            - 'code'
          token_endpoint_auth_method: 'client_secret_basic'
          authorization_policy: 'two_factor'
          consent_mode: 'pre-configured'
          pre_configured_consent_duration: '1 month'
        - client_id: 'technitium'
          client_name: 'Technitium DNS'
          client_secret:
            path: '/secrets/authelia-oidc/technitium.client-secret.hash'
          redirect_uris:
            - 'http://10.0.0.104:5380/sso/callback'
            - 'http://10.0.0.201:5380/sso/callback'
          scopes:
            - 'openid'
            - 'profile'
            - 'email'
          grant_types:
            - 'authorization_code'
          response_types:
            - 'code'
          token_endpoint_auth_method: 'client_secret_post'
          authorization_policy: 'two_factor'
          consent_mode: 'pre-configured'
          pre_configured_consent_duration: '1 month'
