apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "longhorn.talos-cluster.local.obleey.com"
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
