controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

repoServer:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

applicationSet:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

configs:
  params:
    server.insecure: true
  cm:
    url: https://argocd.talos-cluster.local.obleey.com
    timeout.reconciliation: 30s
    resource.customizations.ignoreDifferences.argoproj.io_Application: |
      jqPathExpressions:
        - .metadata.annotations["argocd.argoproj.io/tracking-id"]

notifications:
  enabled: true
  secret:
    create: false
  cm:
    create: true
  notifiers:
    service.slack: |
      token: $slack-token

  templates:
    template.app-sync-failed: |
      slack:
        blocks: |
          [{
            "type": "header",
            "text": {
              "type": "plain_text",
              "text": ":red_circle: Sync Failed — {{.app.metadata.name}}"
            }
          },
          {
            "type": "section",
            "fields": [
              {
                "type": "mrkdwn",
                "text": "*Cluster*\ntalos-cluster"
              },
              {
                "type": "mrkdwn",
                "text": "*Phase*\n{{.app.status.operationState.phase}}"
              },
              {
                "type": "mrkdwn",
                "text": "*Repository*\n{{if .app.spec.source.repoURL}}{{.app.spec.source.repoURL}}{{else if .app.spec.sources}}{{(index .app.spec.sources 0).repoURL}}{{else}}N/A{{end}}"
              },
              {
                "type": "mrkdwn",
                "text": "*Error*\n```{{if .app.status.operationState.message}}{{.app.status.operationState.message}}{{else}}N/A{{end}}```"
              }
            ]
          },
          {
            "type": "actions",
            "elements": [
              {
                "type": "button",
                "style": "danger",
                "text": {"type": "plain_text", "text": "Open App"},
                "url": "https://argocd.talos-cluster.local.obleey.com/applications/{{.app.metadata.name}}"
              },
              {
                "type": "button",
                "text": {"type": "plain_text", "text": "Sync Logs"},
                "url": "https://argocd.talos-cluster.local.obleey.com/applications/{{.app.metadata.name}}?operation=true"
              }
            ]
          }]

  triggers:
    trigger.on-sync-failed: |
      - when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]

  subscriptions:
    - recipients:
        - slack:#deployments
      triggers:
        - on-sync-failed
