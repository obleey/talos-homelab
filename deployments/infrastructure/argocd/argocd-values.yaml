configs:
  params:
    server.insecure: true
  cm:
    url: https://argocd.talos-cluster.local.obleey.com
    timeout.reconciliation: 30s
    resource.customizations.ignoreDifferences.argoproj.io_Application: |
      jqPathExpressions:
        - .metadata.annotations["argocd.argoproj.io/tracking-id"]

notifications:
  enabled: true
  secret:
    create: false
  cm:
    create: true
  context:
    argocdUrl: https://argocd.talos-cluster.local.obleey.com
    clusterName: talos-cluster
  notifiers:
    service.slack: |
      token: $slack-token

  templates:
    template.app-sync-failed: |
      slack:
        attachments: |
          [{
            "color": "#E53935",
            "title": ":red_circle: [{{.context.clusterName}}] {{.app.metadata.name}} sync failed",
            "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
            "fields": [
              {
                "title": "Sync Status",
                "value": "{{.app.status.sync.status}}",
                "short": true
              },
              {
                "title": "Repository",
                "value": "{{if .app.spec.source.repoURL}}{{.app.spec.source.repoURL}}{{else if .app.spec.sources}}{{(index .app.spec.sources 0).repoURL}}{{else}}N/A{{end}}",
                "short": true
              },
              {
                "title": "Error",
                "value": "{{if .app.status.operationState.message}}{{.app.status.operationState.message}}{{else}}N/A{{end}}",
                "short": false
              }
            ]
          }]

    template.app-sync-succeeded: |
      slack:
        attachments: |
          [{
            "color": "#43A047",
            "title": ":large_green_circle: [{{.context.clusterName}}] {{.app.metadata.name}} synced successfully",
            "title_link": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}"
          }]

  triggers:
    trigger.on-sync-failed: |
      - when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
        send: [app-sync-failed]
    trigger.on-sync-succeeded: |
      - when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded']
        send: [app-sync-succeeded]

  subscriptions:
    - recipients:
        - slack:#deployments
      triggers:
        - on-sync-failed
        - on-sync-succeeded
