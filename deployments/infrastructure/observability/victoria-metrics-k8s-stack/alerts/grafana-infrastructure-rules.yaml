apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-infrastructure-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  infrastructure-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: infrastructure
        folder: Infrastructure
        interval: 1m
        rules:

          - uid: infra-cpu-high
            title: Node CPU High
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [80]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: NoData
            execErrState: Alerting
            for: 15m0s
            labels:
              severity: warning
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "77"
              summary: "Node {{ $labels.instance }} CPU usage is high"
              description: 'Node {{ $labels.instance }} CPU has been above 80% for 15 minutes (current: {{ printf "%.1f" $value }}%).'
            isPaused: false

          - uid: infra-cpu-critical
            title: Node CPU Critical
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [95]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: NoData
            execErrState: Alerting
            for: 5m0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "3"
              summary: "Node {{ $labels.instance }} CPU is critically high"
              description: 'Node {{ $labels.instance }} CPU has been above 95% for 5 minutes (current: {{ printf "%.1f" $value }}%).'
            isPaused: false

          - uid: infra-memory-high
            title: Node Memory High
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(1 - node_memory_MemAvailable_bytes{instance!="truenas"} / node_memory_MemTotal_bytes{instance!="truenas"}) * 100'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [85]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: NoData
            execErrState: Alerting
            for: 10m0s
            labels:
              severity: warning
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "78"
              summary: "Node {{ $labels.instance }} memory usage is high"
              description: 'Node {{ $labels.instance }} memory has been above 85% for 10 minutes (current: {{ printf "%.1f" $value }}%). MemAvailable includes reclaimable cache.'
            isPaused: false

          - uid: infra-memory-critical
            title: Node Memory Critical
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(1 - node_memory_MemAvailable_bytes{instance!="truenas"} / node_memory_MemTotal_bytes{instance!="truenas"}) * 100'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [93]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: NoData
            execErrState: Alerting
            for: 5m0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "24"
              summary: "Node {{ $labels.instance }} memory is critically high"
              description: 'Node {{ $labels.instance }} memory has been above 93% for 5 minutes (current: {{ printf "%.1f" $value }}%). OOM kills imminent.'
            isPaused: false

          - uid: infra-oom-kill
            title: Node OOM Kill
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'floor(increase(node_vmstat_oom_kill[15m]))'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "24"
              summary: "OOM kill on node {{ $labels.instance }}"
              description: 'Node {{ $labels.instance }} had {{ printf "%.0f" $value }} OOM kill(s) in the last 15 minutes. A process was killed due to memory exhaustion.'
            isPaused: false

          - uid: infra-high-load
            title: Node High Load Average
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'node_load15 / on(instance) group_left count by(instance)(count by(instance,cpu)(node_cpu_seconds_total))'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [2]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: NoData
            execErrState: Alerting
            for: 15m0s
            labels:
              severity: warning
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "155"
              summary: "Node {{ $labels.instance }} load average is high"
              description: 'Node {{ $labels.instance }} 15m load average is {{ printf "%.2f" $value }}x the number of CPU cores and has been sustained for 15 minutes.'
            isPaused: false

          - uid: infra-disk-saturation
            title: Node Disk I/O Saturation
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'max by(instance)(rate(node_disk_io_time_seconds_total{device!~"loop.*|dm-.*"}[5m])) * 100'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [90]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: NoData
            execErrState: Alerting
            for: 15m0s
            labels:
              severity: warning
            annotations:
              __dashboardUid__: node-exporter-full
              __panelId__: "127"
              summary: "Node {{ $labels.instance }} disk I/O is saturated"
              description: 'Node {{ $labels.instance }} busiest disk has been > 90% I/O utilization for 15 minutes. This may indicate a storage bottleneck.'
            isPaused: false
