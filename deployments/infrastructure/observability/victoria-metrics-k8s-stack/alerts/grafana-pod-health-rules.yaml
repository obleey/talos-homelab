apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-pod-health-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  pod-health-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: pod-health
        folder: Kubernetes Alerts
        interval: 1m
        rules:

          - uid: container-oom-killed
            title: Container OOM Killed
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: |
                    increase(kube_pod_container_status_restarts_total[15m]) > 0
                    and on(namespace, pod, container)
                    kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: k8s_views_pods
              __panelId__: "60"
              summary: "Container OOM killed ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) was OOM killed. Increase its memory limit."
            isPaused: false

          - uid: container-high-restart-rate
            title: Container High Restart Rate
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'increase(kube_pod_container_status_restarts_total[15m]) > 5'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: k8s_views_pods
              __panelId__: "61"
              summary: "Container crash-looping ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) has restarted {{ $value | printf \"%.0f\" }} times in the last 15 minutes."
            isPaused: false

          - uid: container-memory-pressure
            title: Container High Memory Usage
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: |
                    (
                      container_memory_working_set_bytes{container!="", image!=""}
                      / on(namespace, pod, container)
                      kube_pod_container_resource_limits{resource="memory"}
                    ) > 0.85
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: warning
            annotations:
              __dashboardUid__: k8s_views_pods
              __panelId__: "30"
              summary: "Container memory pressure ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} ({{ $labels.namespace }}) is using {{ $value | humanizePercentage }} of its memory limit."
            isPaused: false
