apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-apps-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  apps-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: apps
        folder: Apps
        interval: 1m
        rules:

          - uid: servarr-app-down
            title: Servarr App Down
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_deployment_status_replicas_available{namespace="servarr"} == 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: warning
            annotations:
              __dashboardUid__: "becuowssfebcwa"
              __panelId__: "2"
              summary: "App pod down ({{ $labels.deployment }})"
              description: "Deployment {{ $labels.deployment }} has had 0 available replicas for 5 minutes."
            isPaused: false

          - uid: media-server-down
            title: Media Server Down
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_deployment_status_replicas_available{namespace="servarr", deployment=~"plex|jellyfin"} == 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "becuowssfebcwa"
              __panelId__: "12"
              summary: "Media server pod down ({{ $labels.deployment }})"
              description: "{{ $labels.deployment }} has had 0 available replicas for 5 minutes."
            isPaused: false

          - uid: scraparr-service-unreachable
            title: Arr App API Unreachable
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'scraparr_services_up == 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: warning
            annotations:
              __dashboardUid__: "becuowssfebcwa"
              __panelId__: "2"
              summary: "Arr app API unreachable ({{ $labels.alias }})"
              description: "Scraparr cannot reach the {{ $labels.alias }} API. The pod may be running but the app is unresponsive."
            isPaused: false
