apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-network-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  network-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: network
        folder: Infrastructure
        interval: 2m
        rules:

          - uid: net-high-inbound-traffic
            title: High Inbound Network Traffic
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: >-
                    sum by (instance) (
                      rate(node_network_receive_bytes_total{
                        device!~"lo|veth.*|br.*|tunl.*|cilium.*|lxc.*|cni.*"
                      }[5m])
                    ) / 1024 / 1024
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [50]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: warning
            annotations:
              __dashboardUid__: "node-exporter-full"
              __panelId__: "84"
              summary: "High inbound traffic on {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} is receiving {{ $value | printf \"%.1f\" }} MB/s of inbound traffic (threshold: 50 MB/s)."
            isPaused: false

          - uid: net-high-outbound-traffic
            title: High Outbound Network Traffic
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: >-
                    sum by (instance) (
                      rate(node_network_transmit_bytes_total{
                        device!~"lo|veth.*|br.*|tunl.*|cilium.*|lxc.*|cni.*"
                      }[5m])
                    ) / 1024 / 1024
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [50]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: warning
            annotations:
              __dashboardUid__: "node-exporter-full"
              __panelId__: "84"
              summary: "High outbound traffic on {{ $labels.instance }}"
              description: "Node {{ $labels.instance }} is transmitting {{ $value | printf \"%.1f\" }} MB/s of outbound traffic (threshold: 50 MB/s — Plex/Jellyfin streaming will contribute here)."
            isPaused: false
