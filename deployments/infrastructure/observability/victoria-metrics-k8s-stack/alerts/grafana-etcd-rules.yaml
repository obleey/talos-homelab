apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-etcd-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  etcd-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: etcd
        folder: Infrastructure
        interval: 1m
        rules:

          - uid: etcd-no-leader
            title: Etcd No Leader
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  # Returns 1 when no leader, 0 when leader exists
                  expr: '1 - min(etcd_server_has_leader)'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Etcd has no leader"
              description: "Etcd cluster has no leader. Kubernetes control plane operations are failing."
            isPaused: false

          - uid: etcd-insufficient-members
            title: Etcd Insufficient Members
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  # Returns 0 when member count is even (quorum lost), 1 when odd (healthy)
                  expr: 'count(etcd_server_id) % 2'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [1]
                        type: lt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Etcd has even number of members (quorum at risk)"
              description: "Etcd cluster has {{ $value }} members. An even number means quorum cannot be maintained if one more member is lost."
            isPaused: false

          - uid: etcd-grpc-errors-critical
            title: Etcd High Number of Failed gRPC Requests
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: >-
                    sum(rate(grpc_server_handled_total{job="kube-etcd",grpc_code=~"Internal|Unavailable|DeadlineExceeded|ResourceExhausted|Aborted|Unknown"}[1m])) by (grpc_service, grpc_method)
                    / sum(rate(grpc_server_handled_total{job="kube-etcd"}[1m])) by (grpc_service, grpc_method) * 100 > 5
                    and sum(rate(grpc_server_handled_total{job="kube-etcd"}[1m])) by (grpc_service, grpc_method) > 0
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Etcd high gRPC error rate on {{ $labels.grpc_service }}/{{ $labels.grpc_method }}"
              description: "Etcd gRPC error rate is {{ $value | printf \"%.1f\" }}% (threshold: 5%) for {{ $labels.grpc_service }}/{{ $labels.grpc_method }}."
            isPaused: false

          - uid: etcd-http-errors-critical
            title: Etcd High Number of Failed HTTP Requests
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: >-
                    sum(rate(etcd_http_failed_total[1m])) by (method)
                    / sum(rate(etcd_http_received_total[1m])) by (method) * 100 > 5
                    and sum(rate(etcd_http_received_total[1m])) by (method) > 0
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "Etcd high HTTP error rate for {{ $labels.method }}"
              description: "Etcd HTTP {{ $labels.method }} error rate is {{ $value | printf \"%.1f\" }}% (threshold: 5%)."
            isPaused: false
