apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: recording-rules
  namespace: monitoring
spec:
  groups:
    - name: oom.recording
      interval: 60s
      rules:
        # Dashboards query oom_events_total but cAdvisor exposes container_oom_events_total.
        - record: oom_events_total
          alert: ''
          expr: container_oom_events_total

    - name: traefik.recording
      interval: 60s
      rules:
        # Extracts a clean "service" label from Gateway API router names.
        # Router format: httproute-NS-NAME-gw-traefik-...-ep-websecure-0-HASH@kubernetesgateway
        # Result service label: NS-NAME (e.g. monitoring-grafana, argocd-argocd)
        - record: traefik_route_info
          alert: ''
          expr: |-
            label_replace(
              traefik_router_requests_total,
              "service", "$1",
              "router", "httproute-(.+)-gw-traefik-.*@kubernetesgateway"
            )
