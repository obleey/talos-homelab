apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: oom-recording-rules
  namespace: monitoring
spec:
  groups:
    - name: oom.recording
      interval: 60s
      rules:
        # Dashboards query oom_events_total but cAdvisor exposes container_oom_events_total.
        - record: oom_events_total
          expr: container_oom_events_total
