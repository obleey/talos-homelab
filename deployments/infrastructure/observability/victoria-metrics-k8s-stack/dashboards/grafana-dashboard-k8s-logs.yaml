apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k8s-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Kubernetes
data:
  k8s-container-logs.json: |
    {
      "title": "Kubernetes Logs",
      "uid": "k8s-container-logs",
      "description": "Pod/container log browser for Kubernetes workloads",
      "editable": true,
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "tags": [
        "kubernetes",
        "logs"
      ],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": {
              "type": "victoriametrics-logs-datasource",
              "uid": "victorialogs"
            },
            "definition": "{namespace=~\".+\"}",
            "query": {
              "field": "namespace",
              "query": "{namespace=~\".+\"}",
              "refId": "A",
              "type": 1
            },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "pod",
            "label": "Pod",
            "type": "query",
            "datasource": {
              "type": "victoriametrics-logs-datasource",
              "uid": "victorialogs"
            },
            "definition": "{namespace=\"$namespace\"}",
            "query": {
              "field": "pod",
              "query": "{namespace=\"$namespace\"}",
              "refId": "A",
              "type": 1
            },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": {
              "type": "victoriametrics-logs-datasource",
              "uid": "victorialogs"
            },
            "definition": "{namespace=\"$namespace\", pod=~\"$pod\"}",
            "query": {
              "field": "container",
              "query": "{namespace=\"$namespace\", pod=~\"$pod\"}",
              "refId": "A",
              "type": 1
            },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          },
          {
            "name": "search",
            "label": "Search",
            "type": "textbox",
            "current": {
              "value": ""
            },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Log Volume",
          "gridPos": {
            "h": 5,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"} | filter \"$search\" | stats by (_time:$__interval, pod) count() as value",
              "refId": "A",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "logs",
          "title": "Logs",
          "gridPos": {
            "h": 23,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false,
            "enableLogDetails": true
          },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\", pod=~\"$pod\", container=~\"$container\"} | filter \"$search\"",
              "refId": "A"
            }
          ]
        }
      ]
    }
