apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-prometheus
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Observability
data:
  prometheus.json: |
    {
      "title": "VictoriaMetrics Overview",
      "uid": "victoriametrics-overview",
      "description": "VictoriaMetrics stack health: storage, scrape targets, remote write",
      "editable": true,
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "tags": ["victoriametrics", "observability"],
      "panels": [
        {
          "id": 1, "type": "row", "title": "Stack Status",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false, "panels": []
        },
        {
          "id": 2, "type": "stat", "title": "VMSingle",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red", "index": 0}, "1": {"text": "UP", "color": "green", "index": 1}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "background"},
          "targets": [{"expr": "up{job=\"vmsingle-vm\"}", "refId": "A", "legendFormat": "VMSingle"}]
        },
        {
          "id": 3, "type": "stat", "title": "VMAgent",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red", "index": 0}, "1": {"text": "UP", "color": "green", "index": 1}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "background"},
          "targets": [{"expr": "up{job=\"vmagent-vm\"}", "refId": "A", "legendFormat": "VMAgent"}]
        },
        {
          "id": 4, "type": "stat", "title": "VMAlert",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red", "index": 0}, "1": {"text": "UP", "color": "green", "index": 1}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "background"},
          "targets": [{"expr": "up{job=\"vmalert-vm\"}", "refId": "A", "legendFormat": "VMAlert"}]
        },
        {
          "id": 5, "type": "stat", "title": "VM Operator",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red", "index": 0}, "1": {"text": "UP", "color": "green", "index": 1}}}], "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "background"},
          "targets": [{"expr": "up{job=~\"victoria-metrics-k8s-stack-victoria-metrics-operator\"}", "refId": "A", "legendFormat": "VM Operator"}]
        },
        {
          "id": 6, "type": "stat", "title": "Uptime",
          "gridPos": {"h": 4, "w": 24, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "s", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "horizontal", "textMode": "auto", "colorMode": "value"},
          "targets": [
            {"expr": "vm_app_uptime_seconds{job=\"vmsingle-vm\"}", "refId": "A", "legendFormat": "VMSingle"},
            {"expr": "vm_app_uptime_seconds{job=\"vmagent-vm\"}", "refId": "B", "legendFormat": "VMAgent"},
            {"expr": "vm_app_uptime_seconds{job=\"vmalert-vm\"}", "refId": "C", "legendFormat": "VMAlert"},
            {"expr": "vm_app_uptime_seconds{job=~\"victoria-metrics-k8s-stack-victoria-metrics-operator\"}", "refId": "D", "legendFormat": "VM Operator"}
          ]
        },
        {
          "id": 10, "type": "row", "title": "Storage (VMSingle)",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 9},
          "collapsed": false, "panels": []
        },
        {
          "id": 11, "type": "stat", "title": "Total Data Size",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "value"},
          "targets": [{"expr": "sum(vm_data_size_bytes{job=\"vmsingle-vm\"})", "refId": "A", "legendFormat": "Data Size"}]
        },
        {
          "id": 12, "type": "stat", "title": "Rows Stored",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "value"},
          "targets": [{"expr": "sum(vm_rows{job=\"vmsingle-vm\", type=~\"storage/.*\"})", "refId": "A", "legendFormat": "Rows"}]
        },
        {
          "id": 13, "type": "stat", "title": "Ingestion Rate",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "rows/s", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "value"},
          "targets": [{"expr": "sum(rate(vm_rows_inserted_total{job=\"vmsingle-vm\"}[5m]))", "refId": "A", "legendFormat": "rows/s"}]
        },
        {
          "id": 14, "type": "stat", "title": "Concurrent Inserts",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 10},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 8}, {"color": "red", "value": 14}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "background"},
          "targets": [{"expr": "vm_concurrent_insert_current{job=\"vmsingle-vm\"}", "refId": "A", "legendFormat": "Active"}]
        },
        {
          "id": 15, "type": "timeseries", "title": "Ingestion Rate",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 10, "showPoints": "never"}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "sum by (type) (rate(vm_rows_inserted_total{job=\"vmsingle-vm\"}[5m]))", "refId": "A", "legendFormat": "{{type}}"}]
        },
        {
          "id": 16, "type": "timeseries", "title": "Data Size",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 14},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes", "custom": {"fillOpacity": 10, "showPoints": "never"}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "sum(vm_data_size_bytes{job=\"vmsingle-vm\"})", "refId": "A", "legendFormat": "Total"}]
        },
        {
          "id": 20, "type": "row", "title": "Scrape Health",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 21},
          "collapsed": false, "panels": []
        },
        {
          "id": 21, "type": "stat", "title": "Active Targets",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 22},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "value"},
          "targets": [{"expr": "count(up)", "refId": "A", "legendFormat": "Targets"}]
        },
        {
          "id": 22, "type": "stat", "title": "Down Targets",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 22},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}, "noValue": "0"}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "orientation": "auto", "textMode": "auto", "colorMode": "background"},
          "targets": [{"expr": "count(up == 0) OR vector(0)", "refId": "A", "legendFormat": "Down"}]
        },
        {
          "id": 23, "type": "timeseries", "title": "Targets by Job",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 22},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 10, "showPoints": "never"}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "sum by (job) (up)", "refId": "A", "legendFormat": "{{job}}"}]
        },
        {
          "id": 24, "type": "table", "title": "Down Targets",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 26},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {}},
          "options": {"sortBy": [{"desc": false, "displayName": "job"}]},
          "targets": [{"expr": "up == 0", "refId": "A", "legendFormat": "", "format": "table", "instant": true}]
        },
        {
          "id": 30, "type": "row", "title": "Remote Write (VMAgent)",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 34},
          "collapsed": false, "panels": []
        },
        {
          "id": 31, "type": "timeseries", "title": "Bytes Sent/s",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 35},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "Bps", "custom": {"fillOpacity": 10, "showPoints": "never"}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "rate(vmagent_remotewrite_bytes_sent_total{job=\"vmagent-vm\"}[5m])", "refId": "A", "legendFormat": "bytes/s"}]
        },
        {
          "id": 32, "type": "timeseries", "title": "Remote Write Errors/s",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 35},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 10, "showPoints": "never"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.01}]}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [{"expr": "rate(vmagent_remotewrite_errors_total{job=\"vmagent-vm\"}[5m])", "refId": "A", "legendFormat": "errors/s"}]
        }
      ]
    }
