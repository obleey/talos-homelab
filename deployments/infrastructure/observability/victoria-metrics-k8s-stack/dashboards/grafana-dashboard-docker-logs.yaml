apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-docker-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Infrastructure
data:
  docker-logs.json: |
    {
      "title": "Docker Logs",
      "uid": "docker-logs",
      "description": "Log browser for Docker containers on non-Kubernetes hosts",
      "editable": true,
      "schemaVersion": 39,
      "version": 15,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "tags": [
        "docker",
        "logs",
        "loki"
      ],
      "templating": {
        "list": [
          {
            "name": "host",
            "label": "Host",
            "type": "query",
            "datasource": {
              "type": "victoriametrics-logs-datasource",
              "uid": "victorialogs"
            },
            "definition": "{host=~\".+\", host!~\"talos-.*\"}",
            "query": {
              "field": "host",
              "query": "{host=~\".+\", host!~\"talos-.*\"}",
              "refId": "A",
              "stream": "{host=~\".+\", host!~\"talos-.*\"}",
              "type": "fieldValue"
            },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": {
              "type": "victoriametrics-logs-datasource",
              "uid": "victorialogs"
            },
            "definition": "{host=\"$host\"}",
            "query": {
              "field": "container",
              "query": "{host=\"$host\"}",
              "refId": "A",
              "stream": "{host=\"$host\"}",
              "type": "fieldValue"
            },
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          },
          {
            "name": "severity",
            "label": "Severity",
            "type": "query",
            "datasource": {
              "type": "victoriametrics-logs-datasource",
              "uid": "victorialogs"
            },
            "definition": "{host=\"$host\"}",
            "query": {
              "field": "level",
              "query": "{host=\"$host\"}",
              "refId": "A",
              "type": "fieldValue"
            },
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": true,
            "allValue": ".*",
            "current": {}
          },
          {
            "name": "search",
            "label": "Search",
            "type": "textbox",
            "current": {
              "value": ".*"
            },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Logs",
          "gridPos": {
            "h": 22,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "expr": "{host=\"$host\", container=~\"$container\"} | filter level:~\"(?i)$severity\" | filter ~\"(?i)$search\"",
              "refId": "A",
              "legendFormat": "{{container}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Log Volume",
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 22
          },
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "{host=\"$host\", container=~\"$container\"} | filter level:~\"(?i)$severity\" | filter ~\"(?i)$search\" | stats by (_time:$__interval, container) count() as value",
              "refId": "A",
              "legendFormat": "{{container}}",
              "queryType": "statsRange"
            }
          ]
        }
      ]
    }
