apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-kubernetes-alerts
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Kubernetes Alerts
data:
  kubernetes-alerts.json: |
    {
      "title": "Kubernetes Alerts",
      "uid": "kubernetes-alerts-overview",
      "description": "Active alert overview for Kubernetes nodes, workloads, storage, and control plane",
      "editable": true,
      "schemaVersion": 37,
      "version": 1,
      "refresh": "1m",
      "time": {"from": "now-6h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Nodes Ready",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 100}
                ]
              },
              "unit": "percent",
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "100 * sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info)",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Pods Unhealthy",
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"type": "value", "options": {"0": {"color": "green", "index": 0, "text": "None"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(kube_pod_status_phase{phase=~\"Failed|Unknown\"} == 1) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "PV Errors",
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"type": "value", "options": {"0": {"color": "green", "index": 0, "text": "None"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short",
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "count(kube_persistentvolume_status_phase{phase=~\"Failed|Pending\"}) or vector(0)",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "API Server Errors",
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"type": "value", "options": {"0": {"color": "green", "index": 0, "text": "OK"}}}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 0.01}
                ]
              },
              "unit": "percentunit",
              "decimals": 2,
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "center",
            "textMode": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(apiserver_request_total{code=~\"5..\"}[5m])) / sum(rate(apiserver_request_total[5m]))",
              "instant": false,
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "alertlist",
          "title": "Active Alerts",
          "gridPos": {"h": 16, "w": 24, "x": 0, "y": 5},
          "options": {
            "alertInstanceLabelFilter": "{grafana_folder=\"Kubernetes Alerts\"}",
            "alertName": "",
            "dashboardAlerts": false,
            "groupBy": ["alertname"],
            "groupMode": "default",
            "maxItems": 50,
            "minInterval": "1m",
            "sortOrder": 1,
            "stateFilter": {
              "error": true,
              "firing": true,
              "noData": false,
              "normal": false,
              "pending": true
            },
            "viewMode": "list"
          }
        }
      ]
    }
