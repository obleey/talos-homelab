apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-docker-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Infrastructure
data:
  docker-logs.json: |
    {
      "title": "Docker Logs",
      "uid": "docker-logs",
      "description": "Log browser for Docker containers on helion and truenas",
      "editable": true,
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "tags": ["docker", "logs", "loki"],
      "templating": {
        "list": [
          {
            "name": "host",
            "label": "Host",
            "type": "query",
            "datasource": {"type": "loki", "uid": "loki"},
            "query": "label_values({host=~\"helion|truenas\"}, host)",
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": {"type": "loki", "uid": "loki"},
            "query": "label_values({host=\"$host\"}, container)",
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          },
          {
            "name": "search",
            "label": "Search",
            "type": "textbox",
            "current": {"value": ""},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Logs — $host / $container",
          "gridPos": {"h": 22, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "loki", "uid": "loki"},
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{host=\"$host\", container=~\"$container\"} |~ \"(?i)$search\"",
              "refId": "A",
              "legendFormat": "{{container}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Log Volume",
          "gridPos": {"h": 5, "w": 24, "x": 0, "y": 22},
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "fillOpacity": 20,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "sum by (container) (rate({host=\"$host\", container=~\"$container\"} |~ \"(?i)$search\" [1m]))",
              "refId": "A",
              "legendFormat": "{{container}}"
            }
          ]
        }
      ]
    }
