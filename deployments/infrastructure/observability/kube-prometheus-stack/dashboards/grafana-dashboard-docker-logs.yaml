apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-docker-logs
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Infrastructure
data:
  docker-logs.json: |
    {
      "title": "Docker Logs",
      "uid": "docker-logs",
      "description": "Log browser for Docker containers on non-Kubernetes hosts",
      "editable": true,
      "schemaVersion": 39,
      "version": 4,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "tags": ["docker", "logs", "loki"],
      "templating": {
        "list": [
          {
            "name": "host",
            "label": "Host",
            "type": "query",
            "datasource": "Loki",
            "definition": "label_values({host=~\".+\", host!~\"talos-.*\"}, host)",
            "query": "label_values({host=~\".+\", host!~\"talos-.*\"}, host)",
            "refresh": 2,
            "sort": 1,
            "multi": false,
            "includeAll": false,
            "current": {}
          },
          {
            "name": "container",
            "label": "Container",
            "type": "query",
            "datasource": "Loki",
            "definition": "label_values({host=\"$host\"}, container)",
            "query": "label_values({host=\"$host\"}, container)",
            "refresh": 2,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": {}
          },
          {
            "name": "severity",
            "label": "Severity",
            "type": "custom",
            "query": ".*,error|err|fatal|critical,warn|warning,info,debug",
            "options": [
              {"selected": true,  "text": "All",     "value": ".+"},
              {"selected": false, "text": "Error",   "value": "error|err|fatal|critical"},
              {"selected": false, "text": "Warning", "value": "warn|warning"},
              {"selected": false, "text": "Info",    "value": "info"},
              {"selected": false, "text": "Debug",   "value": "debug"}
            ],
            "current": {"text": "All", "value": ".+"},
            "multi": false,
            "includeAll": false
          },
          {
            "name": "search",
            "label": "Search",
            "type": "textbox",
            "current": {"value": ""},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "Logs",
          "gridPos": {"h": 22, "w": 24, "x": 0, "y": 0},
          "datasource": "Loki",
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "{host=\"$host\", container=~\"$container\"} |~ \"(?i)($severity)\" |= \"$search\"",
              "refId": "A",
              "legendFormat": "{{container}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Log Volume",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 22},
          "datasource": "Loki",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "fillOpacity": 15,
                "lineWidth": 1,
                "showPoints": "never"
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom"},
            "tooltip": {"mode": "multi"}
          },
          "targets": [
            {
              "expr": "sum by (container) (rate({host=\"$host\", container=~\"$container\"} |~ \"(?i)($severity)\" |= \"$search\" [2m]))",
              "refId": "A",
              "legendFormat": "{{container}}"
            }
          ]
        }
      ]
    }
