apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-home
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Infrastructure
data:
  homelab-home.json: |
    {
      "annotations": {"list": []},
      "description": "Homelab cluster health at a glance",
      "editable": true,
      "graphTooltip": 0,
      "links": [
        {
          "asDropdown": true,
          "icon": "external link",
          "keepTime": true,
          "tags": [],
          "title": "Dashboards",
          "tooltip": "",
          "type": "dashboards",
          "url": ""
        }
      ],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 0,
              "mappings": [],
              "noValue": "0",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 66},
                  {"color": "green", "value": 100}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "100 * sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"}) / count(kube_node_info)",
            "instant": true,
            "refId": "A"
          }],
          "title": "Nodes Ready",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "noValue": "0",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(kube_pod_status_phase{phase=\"Running\"}) or vector(0)",
            "instant": true,
            "refId": "A"
          }],
          "title": "Pods Running",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {"color": "green", "index": 0, "text": "None"}
                  }
                }
              ],
              "noValue": "0",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "sum(kube_pod_status_phase{phase=~\"Failed|Unknown\"} == 1) or vector(0)",
            "instant": true,
            "refId": "A"
          }],
          "title": "Pods Unhealthy",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 1,
              "mappings": [],
              "max": 100,
              "min": 0,
              "noValue": "N/A",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 80},
                  {"color": "red", "value": 90}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "100 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100",
            "instant": true,
            "refId": "A"
          }],
          "title": "CPU",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 1,
              "mappings": [],
              "max": 100,
              "min": 0,
              "noValue": "N/A",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 80},
                  {"color": "red", "value": 90}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "id": 5,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))",
            "instant": true,
            "refId": "A"
          }],
          "title": "Memory",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "decimals": 1,
              "mappings": [],
              "max": 100,
              "min": 0,
              "noValue": "N/A",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "orange", "value": 70},
                  {"color": "red", "value": 85}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "id": 6,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "100 * sum(longhorn_volume_actual_size_bytes) / sum(longhorn_volume_capacity_bytes) or vector(0)",
            "instant": true,
            "refId": "A"
          }],
          "title": "Longhorn Storage",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 4},
          "id": 7,
          "title": "Endpoint Status",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {"color": "red", "index": 0, "text": "DOWN"},
                    "1": {"color": "green", "index": 1, "text": "UP"}
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "unit": "short",
              "noValue": "DOWN"
            },
            "overrides": []
          },
          "gridPos": {"h": 9, "w": 24, "x": 0, "y": 5},
          "id": 8,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "targets": [{
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "expr": "label_replace(probe_success{job=\"blackbox\"}, \"instance\", \"$1\", \"name\", \"(.+)\")",
            "instant": true,
            "legendFormat": "{{instance}}",
            "refId": "A"
          }],
          "title": "Endpoints",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 14},
          "id": 9,
          "title": "Active Alerts",
          "type": "row"
        },
        {
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 15},
          "id": 10,
          "options": {
            "alertInstanceLabelFilter": "",
            "alertName": "",
            "dashboardAlerts": false,
            "groupBy": ["grafana_folder", "alertname"],
            "groupMode": "default",
            "maxItems": 20,
            "minInterval": "1m",
            "sortOrder": 1,
            "stateFilter": {
              "error": true,
              "firing": true,
              "noData": false,
              "normal": false,
              "pending": true
            },
            "viewMode": "list"
          },
          "title": "Active Alerts",
          "type": "alertlist"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["overview"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Homelab Overview",
      "uid": "homelab-home",
      "version": 1,
      "weekStart": ""
    }
