fullnameOverride: kps

# Endpoints are globally excluded in ArgoCD, so the ServiceMonitor/Endpoints
# approach for control plane components won't work. Use additionalScrapeConfigs
# with static targets instead, matching the job names dashboards expect.
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false

# kube-proxy is disabled on this cluster (Cilium handles it)
kubeProxy:
  enabled: false

# Disable alert rules — keep only recording rules (needed by dashboards).
# Alerting is handled by Grafana unified alerting instead.
defaultRules:
  rules:
    alertmanager: false
    configReloaders: false
    general: false
    kubeApiserverAvailability: false
    kubeApiserverBurnrate: false
    kubeApiserverSlos: false
    kubeControllerManager: false
    kubeProxyAlerting: false
    kubeProxyRecording: false   # kube-proxy disabled (Cilium)
    kubeSchedulerAlerting: false
    kubernetesApps: false
    kubernetesResources: false
    kubernetesStorage: false
    kubernetesSystem: false
    nodeExporterAlerting: false
    prometheus: false
    prometheusOperator: false
    etcd: false
    # Recording rules — keep for dashboards
    k8sContainerCpuUsageSecondsTotal: true
    k8sContainerMemoryCache: true
    k8sContainerMemoryRss: true
    k8sContainerMemorySwap: true
    k8sContainerMemoryWorkingSetBytes: true
    k8sContainerResource: true
    k8sPodOwner: true
    kubeApiserverHistogram: true
    kubelet: true
    kubeSchedulerRecording: true
    kubeStateMetrics: false
    network: false
    node: true
    nodeExporterRecording: true

prometheus:
  prometheusSpec:
    enableRemoteWriteReceiver: true
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    # pick up ServiceMonitors/PodMonitors from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: kube-etcd
        scheme: http
        static_configs:
          - targets: ['10.0.0.160:2381']
            labels:
              node: talos-control-plane-1
      - job_name: kube-scheduler
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        static_configs:
          - targets: ['10.0.0.160:10259']
            labels:
              node: talos-control-plane-1
      - job_name: kube-controller-manager
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        static_configs:
          - targets: ['10.0.0.160:10257']
            labels:
              node: talos-control-plane-1

# Disable Alertmanager — Grafana unified alerting handles notifications
alertmanager:
  enabled: false

grafana:
  deploymentStrategy:
    type: Recreate
  admin:
    existingSecret: kps-grafana
    userKey: admin-user
    passwordKey: admin-password
  envFromSecret: grafana-slack-token
  envValueFrom:
    GF_AUTH_GOOGLE_CLIENT_ID:
      secretKeyRef:
        name: grafana-google-oauth
        key: client_id
    GF_AUTH_GOOGLE_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-google-oauth
        key: client_secret
    GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
      secretKeyRef:
        name: grafana-authelia-oauth
        key: client_id
    GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
      secretKeyRef:
        name: grafana-authelia-oauth
        key: client_secret
  defaultDashboardsEnabled: false
  defaultDashboardsTimezone: browser
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
      folderAnnotation: grafana_folder
      defaultFolderName: "Kubernetes"
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
    alerts:
      enabled: true
      searchNamespace: ALL
      label: grafana_alert
      labelValue: "1"
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 2Gi
  grafana.ini:
    server:
      root_url: https://grafana.talos-cluster.local.obleey.com
    unified_alerting:
      enabled: true
    alerting:
      enabled: false  # disable legacy alerting
    dashboards:
      default_home_dashboard_path: /tmp/dashboards/Kubernetes/Infrastructure/homelab-home.json
    auth.google:
      enabled: true
      client_id: ${GF_AUTH_GOOGLE_CLIENT_ID}
      client_secret: ${GF_AUTH_GOOGLE_CLIENT_SECRET}
      scopes: openid email profile
      auth_url: https://accounts.google.com/o/oauth2/v2/auth
      token_url: https://oauth2.googleapis.com/token
      api_url: https://openidconnect.googleapis.com/v1/userinfo
      allowed_emails: miha.oblishar@gmail.com
      auto_login: false
    auth.generic_oauth:
      enabled: true
      name: Authelia
      client_id: ${GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
      client_secret: ${GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      auth_url: https://auth.talos-cluster.local.obleey.com/api/oidc/authorization
      token_url: https://auth.talos-cluster.local.obleey.com/api/oidc/token
      api_url: https://auth.talos-cluster.local.obleey.com/api/oidc/userinfo
      role_attribute_path: "contains(groups[*], 'admins') && 'Admin' || 'Viewer'"
      role_attribute_strict: false
      allow_sign_up: true
      auto_login: true
    date_formats:
      full_date: DD.MM.YYYY HH:mm:ss
      used_in_range: DD.MM.YYYY HH:mm
      week_start: monday

kubelet:
  serviceMonitor:
    relabelings:
      - action: replace
        sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
      - action: replace
        sourceLabels: [__meta_kubernetes_node_name]
        targetLabel: instance
    cAdvisorRelabelings:
      - action: replace
        sourceLabels: [__metrics_path__]
        targetLabel: metrics_path
      - action: replace
        sourceLabels: [__meta_kubernetes_node_name]
        targetLabel: instance

prometheus-node-exporter:
  tolerations:
    - effect: NoSchedule
      operator: Exists
  prometheus:
    monitor:
      relabelings:
        - action: replace
          sourceLabels: [__meta_kubernetes_endpoint_node_name]
          targetLabel: instance
  extraArgs:
    # Talos restricts block device access from containers — exclude all ephemeral
    # Kubernetes/Longhorn paths that produce spurious permission denied errors.
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run|var/lib/kubelet/.+|var/lib/longhorn)($|/)

kube-state-metrics:
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - statefulsets=[*]
