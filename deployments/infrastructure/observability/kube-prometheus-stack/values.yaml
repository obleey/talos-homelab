fullnameOverride: kps

# Endpoints are globally excluded in ArgoCD, so the ServiceMonitor/Endpoints
# approach for control plane components won't work. Use additionalScrapeConfigs
# with static targets instead, matching the job names dashboards expect.
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false

# kube-proxy is disabled on this cluster (Cilium handles it)
kubeProxy:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi
    # pick up ServiceMonitors/PodMonitors from all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: kube-etcd
        scheme: http
        static_configs:
          - targets: ['10.0.0.160:2381']
            labels:
              node: talos-control-plane-1
      - job_name: kube-scheduler
        scheme: https
        tls_config:
          insecure_skip_verify: true
        static_configs:
          - targets: ['10.0.0.160:10259']
            labels:
              node: talos-control-plane-1
      - job_name: kube-controller-manager
        scheme: https
        tls_config:
          insecure_skip_verify: true
        static_configs:
          - targets: ['10.0.0.160:10257']
            labels:
              node: talos-control-plane-1

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi

grafana:
  admin:
    existingSecret: kps-grafana
    userKey: admin-user
    passwordKey: admin-password
  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: browser
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
  # Loki datasource — added alongside the auto-provisioned Prometheus one
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false
  persistence:
    enabled: true
    storageClassName: longhorn
    size: 2Gi
  grafana.ini:
    server:
      root_url: https://grafana.talos-cluster.local.obleey.com

prometheus-node-exporter:
  tolerations:
    - effect: NoSchedule
      operator: Exists

kube-state-metrics:
  metricLabelsAllowlist:
    - pods=[*]
    - deployments=[*]
    - statefulsets=[*]
