apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "grafana.talos-cluster.local.obleey.com"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
