apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus-remote-write-public
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - "prometheus.obleey.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/write
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: prometheus-basic-auth
      backendRefs:
        - name: kps-prometheus
          port: 9090
