apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-loki-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  loki-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: loki
        folder: Observability
        interval: 1m
        rules:

          - uid: loki-request-errors
            title: Loki Request Errors
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '100 * sum(rate(loki_request_duration_seconds_count{status_code=~"5.."}[1m])) by (namespace, job, route) / sum(rate(loki_request_duration_seconds_count[1m])) by (namespace, job, route) > 10 and sum(rate(loki_request_duration_seconds_count[1m])) by (namespace, job, route) > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 15m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "sadlil-loki-apps-dashboard"
              summary: "Loki request errors (instance {{ $labels.instance }})"
              description: "{{ $labels.job }} / {{ $labels.route }} is experiencing {{ printf \"%.2f\" $value }}% errors. VALUE = {{ $value }}"
            isPaused: false

          - uid: loki-request-panic
            title: Loki Request Panic
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'sum(increase(loki_panic_total[5m])) by (namespace, job) > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "sadlil-loki-apps-dashboard"
              summary: "Loki request panic (instance {{ $labels.instance }})"
              description: "{{ $labels.job }} is experiencing {{ $value | humanize }} panic(s) in the last 5 minutes. VALUE = {{ $value }}"
            isPaused: false

          - uid: loki-request-latency
            title: Loki Request Latency
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'histogram_quantile(0.99, sum(rate(loki_request_duration_seconds_bucket{route!~"(?i).*tail.*"}[5m])) by (namespace, job, route, le)) > 1'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "sadlil-loki-apps-dashboard"
              summary: "Loki request latency (instance {{ $labels.instance }})"
              description: "{{ $labels.job }} / {{ $labels.route }} p99 latency is {{ printf \"%.2f\" $value }}s. VALUE = {{ $value }}"
            isPaused: false
