apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-traefik-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  traefik-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: traefik
        folder: Infrastructure
        interval: 1m
        rules:

          - uid: traefik-service-down
            title: Traefik Backend Service Down
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  # Count servers with up==0 per service; returns non-zero when any server is down
                  expr: 'count by (service) (traefik_service_server_up == 0)'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Traefik service {{ $labels.service }} has no healthy backends"
              description: "{{ $value | printf \"%.0f\" }} backend server(s) are down for Traefik service {{ $labels.service }}."
            isPaused: false

          - uid: traefik-5xx-rate
            title: Traefik High HTTP 5xx Error Rate
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: >-
                    sum(rate(traefik_service_requests_total{code=~"5.*"}[3m])) by (service)
                    / sum(rate(traefik_service_requests_total[3m])) by (service) * 100 > 5
                    and sum(rate(traefik_service_requests_total[3m])) by (service) > 0
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "High 5xx error rate on Traefik service {{ $labels.service }}"
              description: "Traefik service {{ $labels.service }} has a 5xx error rate of {{ $value | printf \"%.1f\" }}% (threshold: 5%)."
            isPaused: false
