apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting-config
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  alerting.yaml: |
    apiVersion: 1

    contactPoints:
      - orgId: 1
        name: slack
        receivers:
          - uid: slack-receiver
            type: slack
            settings:
              token: ${token}
              recipient: "#monitoring"
              title: >-
                {{ if eq .Status "firing" }}🔴 FIRING{{ else }}✅ RESOLVED{{ end }} · {{ .CommonLabels.alertname }}{{ if .CommonAnnotations.summary }} — {{ .CommonAnnotations.summary }}{{ end }}
              text: |
                {{ range .Alerts -}}
                *Severity:* {{ if eq .Labels.severity "critical" }}🚨 Critical{{ else if eq .Labels.severity "warning" }}⚠️ Warning{{ else }}{{ .Labels.severity }}{{ end }}
                {{ if .Annotations.summary }}*Summary:* {{ .Annotations.summary }}
                {{ end -}}
                {{ if .Annotations.description }}*Details:* {{ .Annotations.description }}
                {{ end -}}
                {{ if .Labels.namespace }}*Namespace:* `{{ .Labels.namespace }}`  {{ end -}}
                {{ if .Labels.pod }}*Pod:* `{{ .Labels.pod }}`  {{ end -}}
                {{ if .Labels.instance }}*Host:* `{{ .Labels.instance }}`  {{ end -}}
                {{ if .Labels.service }}*Service:* `{{ .Labels.service }}`{{ end }}
                {{ if .PanelURL }}<{{ .PanelURL }}|📊 Panel>   {{ end -}}
                {{ if .DashboardURL }}<{{ .DashboardURL }}|📈 Dashboard>   {{ end -}}
                <{{ .SilenceURL }}|🔕 Silence>
                {{ end }}
            disableResolveMessage: false

    policies:
      - orgId: 1
        receiver: slack
        group_by: [grafana_folder, alertname]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
