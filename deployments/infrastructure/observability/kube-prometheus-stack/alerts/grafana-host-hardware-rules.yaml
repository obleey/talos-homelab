apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-host-hardware-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  host-hardware-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: host-and-hardware
        folder: Infrastructure
        interval: 1m
        rules:

          - uid: host-disk-space
            title: Host Out of Disk Space
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(node_filesystem_avail_bytes{fstype!~"^(fuse.*|tmpfs|cifs|nfs)"} / node_filesystem_size_bytes < .10 and on (instance, device, mountpoint) node_filesystem_readonly == 0)'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "node-exporter-full"
              __panelId__: "43"
              summary: "Host out of disk space (instance {{ $labels.instance }})"
              description: "Disk {{ $labels.device }} on {{ $labels.mountpoint }} is almost full (< 10% left). VALUE = {{ $value }}"
            isPaused: false

          - uid: host-inodes
            title: Host Out of Inodes
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(node_filesystem_files_free / node_filesystem_files < .10 and ON (instance, device, mountpoint) node_filesystem_readonly == 0) and node_filesystem_files > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "node-exporter-full"
              __panelId__: "43"
              summary: "Host out of inodes (instance {{ $labels.instance }})"
              description: "Disk {{ $labels.device }} on {{ $labels.mountpoint }} is almost running out of available inodes (< 10% left). VALUE = {{ $value }}"
            isPaused: false

          - uid: host-overtemperature
            title: Host Node Overtemperature Alarm
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '((node_hwmon_temp_crit_alarm_celsius == 1) or (node_hwmon_temp_alarm == 1))'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "node-exporter-full"
              summary: "Host node overtemperature alarm (instance {{ $labels.instance }})"
              description: "Physical node temperature alarm triggered on {{ $labels.instance }}. VALUE = {{ $value }}"
            isPaused: false

          - uid: host-raid-insufficient
            title: Host Software RAID Insufficient Drives
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '((node_md_disks_required - ignoring(state) node_md_disks{state="active"}) > 0)'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "node-exporter-full"
              __panelId__: "43"
              summary: "Host software RAID insufficient drives (instance {{ $labels.instance }})"
              description: "MD RAID array {{ $labels.device }} on {{ $labels.instance }} has insufficient active drives. VALUE = {{ $value }}"
            isPaused: false

          - uid: host-fs-device-error
            title: Host Filesystem Device Error
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: |
                    node_filesystem_device_error{
                      fstype!~"tmpfs|overlay|squashfs|autofs|binfmt_misc|cgroup.*|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|proc|procfs|pstore|rpc_pipefs|securityfs|sysfs|tracefs",
                      mountpoint!~"^/var/lib/(kubelet|longhorn)(/.*)?$"
                    } == 1
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 5m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "node-exporter-full"
              summary: "Filesystem device error on {{ $labels.instance }}: {{ $labels.mountpoint }} ({{ $labels.device_error }})"
              description: "Device {{ $labels.device }} mounted at {{ $labels.mountpoint }} on {{ $labels.instance }} is reporting an error. VALUE = {{ $value }}"
            isPaused: false
