apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-kubernetes-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  kubernetes-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: kubernetes-nodes
        folder: Kubernetes Alerts
        interval: 1m
        rules:

          - uid: k8s-node-not-ready
            title: Kubernetes Node Not Ready
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_node_status_condition{condition="Ready",status="true"} == 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 10m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Node not ready ({{ $labels.node }})"
              description: "Node {{ $labels.node }} has been unready for more than 10 minutes. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-node-memory-pressure
            title: Kubernetes Node Memory Pressure
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_node_status_condition{condition="MemoryPressure",status="true"} == 1'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Node memory pressure ({{ $labels.node }})"
              description: "Node {{ $labels.node }} has MemoryPressure condition set. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-node-disk-pressure
            title: Kubernetes Node Disk Pressure
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_node_status_condition{condition="DiskPressure",status="true"} == 1'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Node disk pressure ({{ $labels.node }})"
              description: "Node {{ $labels.node }} has DiskPressure condition set. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-node-network-unavailable
            title: Kubernetes Node Network Unavailable
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_node_status_condition{condition="NetworkUnavailable",status="true"} == 1'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Node network unavailable ({{ $labels.node }})"
              description: "Node {{ $labels.node }} has NetworkUnavailable condition set. VALUE = {{ $value }}"
            isPaused: false

      - orgId: 1
        name: kubernetes-workloads
        folder: Kubernetes Alerts
        interval: 1m
        rules:

          - uid: k8s-pod-not-healthy
            title: Kubernetes Pod Not Healthy
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'sum by (namespace, pod) (kube_pod_status_phase{phase=~"Pending|Unknown|Failed"}) > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 15m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Pod not healthy ({{ $labels.namespace }}/{{ $labels.pod }})"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-running state for more than 15 minutes. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-statefulset-down
            title: Kubernetes StatefulSet Down
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_statefulset_replicas != kube_statefulset_status_replicas_ready > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 1m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes StatefulSet down ({{ $labels.namespace }}/{{ $labels.statefulset }})"
              description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} went down. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-deployment-gen-mismatch
            title: Kubernetes Deployment Generation Mismatch
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_deployment_status_observed_generation != kube_deployment_metadata_generation'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 10m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Deployment generation mismatch ({{ $labels.namespace }}/{{ $labels.deployment }})"
              description: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has failed but has not been rolled back. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-statefulset-gen-mismatch
            title: Kubernetes StatefulSet Generation Mismatch
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_statefulset_status_observed_generation != kube_statefulset_metadata_generation'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 10m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes StatefulSet generation mismatch ({{ $labels.namespace }}/{{ $labels.statefulset }})"
              description: "StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has failed but has not been rolled back. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-daemonset-misscheduled
            title: Kubernetes DaemonSet Misscheduled
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_daemonset_status_number_misscheduled > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 1m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes DaemonSet misscheduled ({{ $labels.namespace }}/{{ $labels.daemonset }})"
              description: "Some Pods of DaemonSet {{ $labels.namespace }}/{{ $labels.daemonset }} are running where they are not supposed to run. VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-cronjob-failing
            title: Kubernetes CronJob Failing
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(kube_cronjob_status_last_schedule_time > kube_cronjob_status_last_successful_time) AND (kube_cronjob_status_active == 0) AND (kube_cronjob_spec_suspend == 0)'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes CronJob failing ({{ $labels.namespace }}/{{ $labels.cronjob }})"
              description: "CronJob {{ $labels.namespace }}/{{ $labels.cronjob }} is failing (last schedule is newer than last success and no active runs). VALUE = {{ $value }}"
            isPaused: false

          - uid: k8s-job-slow-completion
            title: Kubernetes Job Slow Completion
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_job_spec_completions - kube_job_status_succeeded - kube_job_status_failed > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 12h
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Job slow completion ({{ $labels.namespace }}/{{ $labels.job_name }})"
              description: "Kubernetes Job {{ $labels.namespace }}/{{ $labels.job_name }} did not complete in time. VALUE = {{ $value }}"
            isPaused: false

      - orgId: 1
        name: kubernetes-storage
        folder: Kubernetes Alerts
        interval: 1m
        rules:

          - uid: k8s-volume-fill-4d
            title: Kubernetes Volume Full in Four Days
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 21600
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'predict_linear(kubelet_volume_stats_available_bytes[6h:5m], 4 * 24 * 3600) < 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes Volume full in four days ({{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }})"
              description: "Volume {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is predicted to fill within 4 days based on current growth rate. VALUE = {{ $value | humanize }}"
            isPaused: false

          - uid: k8s-pv-error
            title: Kubernetes PersistentVolume Error
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'kube_persistentvolume_status_phase{phase=~"Failed|Pending"} > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes PersistentVolume error ({{ $labels.persistentvolume }})"
              description: "PersistentVolume {{ $labels.persistentvolume }} is in bad state: {{ $labels.phase }}. VALUE = {{ $value }}"
            isPaused: false

      - orgId: 1
        name: kubernetes-control-plane
        folder: Kubernetes Alerts
        interval: 1m
        rules:

          - uid: k8s-apiserver-errors
            title: Kubernetes API Server Errors
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 120
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'sum(rate(apiserver_request_total{job="apiserver",code=~"(?:5..)"}[1m])) by (instance, job) / sum(rate(apiserver_request_total{job="apiserver"}[1m])) by (instance, job) * 100 > 3 and sum(rate(apiserver_request_total{job="apiserver"}[1m])) by (instance, job) > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes API server errors ({{ $labels.instance }})"
              description: "Kubernetes API server is experiencing {{ $value | humanize }}% 5xx error rate on {{ $labels.instance }}."
            isPaused: false

          - uid: k8s-apiclient-errors
            title: Kubernetes API Client Errors
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 120
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '(sum(rate(rest_client_requests_total{code=~"(4|5).."}[1m])) by (instance, job) / sum(rate(rest_client_requests_total[1m])) by (instance, job)) * 100 > 1 and sum(rate(rest_client_requests_total[1m])) by (instance, job) > 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 2m
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes API client errors ({{ $labels.instance }}/{{ $labels.job }})"
              description: "Kubernetes API client on {{ $labels.instance }} is experiencing {{ $value | humanize }}% 4xx/5xx error rate."
            isPaused: false

          - uid: k8s-cert-expires-soon
            title: Kubernetes Client Certificate Expires Soon
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0 and histogram_quantile(0.01, sum by (job, le) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 24*60*60'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              __dashboardUid__: "kubernetes-alerts-overview"
              __panelId__: "5"
              summary: "Kubernetes client certificate expires soon"
              description: "A client certificate used to authenticate to the apiserver is expiring in less than 24 hours. VALUE = {{ $value }}"
            isPaused: false
