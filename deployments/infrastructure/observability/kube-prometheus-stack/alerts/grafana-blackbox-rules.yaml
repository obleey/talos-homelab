apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-blackbox-rules
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  blackbox-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: blackbox
        folder: Infrastructure
        interval: 2m
        rules:

          - uid: blackbox-probe-failed
            title: Blackbox Probe Failed
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'probe_success{job="blackbox"} == 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Host unreachable: {{ $labels.instance }}"
              description: "Blackbox probe failed for {{ $labels.instance }} (target: {{ $labels.name }}). The service is not responding."
            isPaused: false

          - uid: blackbox-probe-http-failure
            title: Blackbox Probe HTTP Failure
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'probe_http_status_code{job="blackbox"} <= 199 or probe_http_status_code{job="blackbox"} >= 500'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "HTTP 5xx from {{ $labels.instance }}"
              description: "HTTP probe returned a 5xx error for {{ $labels.instance }}. STATUS = {{ $value }}"
            isPaused: false

          - uid: blackbox-ssl-expiry-soon
            title: Blackbox SSL Certificate Expiry Soon
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: '0 <= round((last_over_time(probe_ssl_earliest_cert_expiry{job="blackbox"}[10m]) - time()) / 86400, 0.1) < 3'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "SSL certificate expiring in < 3 days: {{ $labels.instance }}"
              description: "SSL certificate for {{ $labels.instance }} expires in {{ $value }} days."
            isPaused: false

          - uid: blackbox-ssl-expired
            title: Blackbox SSL Certificate Expired
            condition: threshold
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'round((last_over_time(probe_ssl_earliest_cert_expiry{job="blackbox"}[10m]) - time()) / 86400, 0.1) < 0'
                  instant: true
                  refId: A
              - refId: threshold
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: "-100"
                model:
                  conditions:
                    - evaluator:
                        params: [0]
                        type: gt
                      operator:
                        type: and
                      query:
                        params: [A]
                      reducer:
                        params: []
                        type: last
                      type: query
                  datasource:
                    type: __expr__
                    uid: "-100"
                  expression: A
                  refId: threshold
                  type: threshold
            noDataState: OK
            execErrState: Alerting
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "SSL certificate EXPIRED: {{ $labels.instance }}"
              description: "SSL certificate for {{ $labels.instance }} has expired {{ $value | abs }} days ago."
            isPaused: false
