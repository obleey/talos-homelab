alloy:
  configMap:
    content: |
      // Discover all pods in the cluster
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Relabel pod targets for log collection
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
          separator     = "/"
          target_label  = "job"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          action        = "replace"
          replacement   = "/var/log/pods/*$1/*.log"
          target_label  = "__path__"
        }
        rule {
          action        = "replace"
          source_labels = ["__meta_kubernetes_pod_container_type"]
          regex         = "init"
          replacement   = "init"
          target_label  = "init_container"
        }
      }

      // Collect logs from pod log files on the node
      loki.source.file "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      // Parse and enrich log entries
      loki.process "pod_logs" {
        stage.cri {}

        forward_to = [loki.write.default.receiver]
      }

      // Ship logs to Loki
      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

  clustering:
    enabled: false

controller:
  type: daemonset
  tolerations:
    - effect: NoSchedule
      operator: Exists

# Mount host pod log directory
extraVolumes:
  - name: pods
    hostPath:
      path: /var/log/pods

extraVolumeMounts:
  - name: pods
    mountPath: /var/log/pods
    readOnly: true
