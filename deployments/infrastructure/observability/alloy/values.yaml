alloy:
  configMap:
    content: |
      // Discover all pods via Kubernetes API
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Relabel pod metadata into log labels
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "instance"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
          separator     = "/"
          target_label  = "job"
        }
      }

      // Stream logs via Kubernetes API — no hostPath needed, works on Talos
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.write.default.receiver]
      }

      // Ship to Loki
      loki.write "default" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
  tolerations:
    - effect: NoSchedule
      operator: Exists

# RBAC needed for loki.source.kubernetes to read pod logs via API
rbac:
  create: true

clusterRole:
  rules:
    - apiGroups: [""]
      resources: [nodes, nodes/proxy, services, endpoints, pods, pods/log]
      verbs: [get, list, watch]
