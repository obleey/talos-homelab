alloy:
  configMap:
    content: |
      prometheus.exporter.blackbox "probes" {
        config = `
      modules:
        http_home:
          prober: http
          timeout: 10s
          http:
            valid_status_codes: [200, 201, 301, 302, 401, 403, 404]
            method: GET
            follow_redirects: true
            tls_config:
              insecure_skip_verify: true
        http_plain:
          prober: http
          timeout: 10s
          http:
            valid_status_codes: [200, 201, 301, 302, 401, 403, 404]
            method: GET
            follow_redirects: true
        http_strict:
          prober: http
          timeout: 15s
          http:
            valid_status_codes: [200]
            method: GET
            follow_redirects: true
            tls_config:
              insecure_skip_verify: true
      `

        // Kubernetes cluster services
        target {
          name    = "argocd"
          address = "https://argocd.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "bazarr"
          address = "https://bazarr.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "clonarr"
          address = "https://clonarr.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "grafana"
          address = "https://grafana.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "hub"
          address = "https://hub.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "jellyfin"
          address = "https://jellyfin.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "kubeseal"
          address = "https://kubeseal.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "longhorn"
          address = "https://longhorn.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "plex"
          address = "https://plex.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "prowlarr"
          address = "https://prowlarr.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "qbittorrent"
          address = "https://qb.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "radarr"
          address = "https://radarr.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "seerr"
          address = "https://seerr.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "sonarr"
          address = "https://sonarr.talos-cluster.local.obleey.com"
          module  = "http_home"
        }
        target {
          name    = "traefik"
          address = "https://traefik.talos-cluster.local.obleey.com"
          module  = "http_home"
        }

        // Home network appliances — probe both Technitium instances directly by IP
        // so the probe doesn't depend on Technitium DNS being up to resolve the hostname
        target {
          name    = "technitium-primary"
          address = "http://10.0.0.104:5380"
          module  = "http_plain"
        }
        target {
          name    = "technitium-secondary"
          address = "http://10.0.0.201:5380"
          module  = "http_plain"
        }
        target {
          name    = "truenas"
          address = "https://truenas.local.obleey.com"
          module  = "http_home"
        }

        // Helion services
        target {
          name    = "office-decage"
          address = "https://office.decage.net"
          module  = "http_home"
        }
      }

      // Helion public sites — strict 200-only, faster interval to catch PHP-FPM hangs
      prometheus.exporter.blackbox "helion_sites" {
        config = `
      modules:
        http_strict:
          prober: http
          timeout: 15s
          http:
            valid_status_codes: [200]
            method: GET
            follow_redirects: true
            tls_config:
              insecure_skip_verify: true
      `

        target {
          name    = "tilenhudrap"
          address = "https://tilenhudrap.com"
          module  = "http_strict"
        }
      }

      prometheus.scrape "blackbox" {
        targets         = prometheus.exporter.blackbox.probes.targets
        forward_to      = [prometheus.relabel.blackbox_labels.receiver]
        job_name        = "blackbox"
        scrape_interval = "60s"
        scrape_timeout  = "15s"
      }

      prometheus.scrape "blackbox_helion" {
        targets         = prometheus.exporter.blackbox.helion_sites.targets
        forward_to      = [prometheus.relabel.blackbox_labels.receiver]
        job_name        = "blackbox"
        scrape_interval = "30s"
        scrape_timeout  = "20s"
      }

      // Fix labels: set instance = target URL, job = "blackbox"
      prometheus.relabel "blackbox_labels" {
        forward_to = [prometheus.remote_write.prometheus.receiver]

        rule {
          source_labels = ["job"]
          regex         = "integrations/blackbox/(.*)"
          target_label  = "instance"
          replacement   = "$1"
        }

        rule {
          target_label = "job"
          replacement  = "blackbox"
        }
      }

      prometheus.remote_write "prometheus" {
        endpoint {
          url = "http://vmsingle-vm.monitoring.svc.cluster.local:8428/api/v1/write"
        }
      }

controller:
  type: deployment
  replicas: 1

clusterRole:
  rules: []
