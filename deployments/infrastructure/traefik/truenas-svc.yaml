apiVersion: v1
kind: Service
metadata:
  name: truenas
  namespace: traefik
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: adguard
      port: 30004
      targetPort: 30004
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas
  namespace: traefik
subsets:
  - addresses:
      - ip: 10.0.0.104
    ports:
      - name: http
        port: 80
      - name: adguard
        port: 30004
