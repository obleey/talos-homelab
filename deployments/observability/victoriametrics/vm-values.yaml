fullnameOverride: victoria-metrics-single

server:
  retentionPeriod: 1
  persistentVolume:
    enabled: true
    size: 20Gi
    storageClass: longhorn
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  extraArgs:
    envflag.enable: "true"
    envflag.prefix: VM_
    loggerFormat: json

serviceMonitor:
  enabled: false
