apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-metrics-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  k8s-metrics.json: |
    {
      "uid": "k8s-metrics-custom",
      "title": "Kubernetes Metrics",
      "description": "Custom K8s cluster overview: nodes, pods, resources, workloads",
      "tags": ["kubernetes", "metrics", "custom"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [],
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "victoriametrics" },
            "query": { "query": "label_values(kube_namespace_status_phase, namespace)", "refId": "A" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 2,
            "sort": 1,
            "current": { "text": "All", "value": "$__all" }
          },
          {
            "name": "node",
            "label": "Node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "victoriametrics" },
            "query": { "query": "label_values(kube_node_info, node)", "refId": "A" },
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "refresh": 2,
            "sort": 1,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "annotations": { "list": [] },
      "rows": [],
      "__requires": [],
      "__inputs": [],
      "panels": [
        {
          "id": 1,
          "title": "Nodes Ready",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"} == 1)",
              "instant": true,
              "refId": "A",
              "legendFormat": "Ready"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\",namespace=~\"$namespace\"})",
              "instant": true,
              "refId": "A",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "id": 3,
          "title": "Pods Not Running",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase!~\"Running|Succeeded\",namespace=~\"$namespace\"}) or vector(0)",
              "instant": true,
              "refId": "A",
              "legendFormat": "Not Running"
            }
          ]
        },
        {
          "id": 4,
          "title": "Container Restarts (1h)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h])) or vector(0)",
              "instant": true,
              "refId": "A",
              "legendFormat": "Restarts"
            }
          ]
        },
        {
          "id": 5,
          "title": "PVCs Over 80%",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "count((kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.8) or vector(0)",
              "instant": true,
              "refId": "A",
              "legendFormat": "PVCs >80%"
            }
          ]
        },
        {
          "id": 6,
          "title": "Namespaces",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [ { "color": "blue", "value": null } ]
              }
            }
          },
          "targets": [
            {
              "expr": "count(kube_namespace_status_phase{phase=\"Active\"})",
              "instant": true,
              "refId": "A",
              "legendFormat": "Active"
            }
          ]
        },
        {
          "id": 10,
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "lineWidth": 2 },
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "(1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\",job=\"node-exporter\",instance=~\"$node.*\"}[5m]))) * 100",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 11,
          "title": "Node Memory Usage %",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "lineWidth": 2 },
              "min": 0,
              "max": 100,
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "(1 - node_memory_MemAvailable_bytes{job=\"node-exporter\",instance=~\"$node.*\"} / node_memory_MemTotal_bytes{job=\"node-exporter\",instance=~\"$node.*\"}) * 100",
              "refId": "A",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 12,
          "title": "Container CPU Usage (top 10)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "custom": { "lineWidth": 1 },
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "topk(10, sum by (namespace, pod, container) (rate(container_cpu_usage_seconds_total{namespace=~\"$namespace\",container!=\"\",image!=\"\",job=\"cadvisor\"}[5m])))",
              "refId": "A",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ]
        },
        {
          "id": 13,
          "title": "Container Memory Usage (top 10)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "lineWidth": 1 },
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "topk(10, sum by (namespace, pod, container) (container_memory_working_set_bytes{namespace=~\"$namespace\",container!=\"\",image!=\"\",job=\"cadvisor\"}))",
              "refId": "A",
              "legendFormat": "{{namespace}}/{{pod}}"
            }
          ]
        },
        {
          "id": 14,
          "title": "Container Restarts by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "tooltip": { "mode": "multi" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2, "drawStyle": "bars" },
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[10m])) > 0",
              "refId": "A",
              "legendFormat": "{{namespace}}/{{pod}}/{{container}}"
            }
          ]
        },
        {
          "id": 15,
          "title": "PVC Usage %",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "minVizWidth": 0,
            "minVizHeight": 16
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "(kubelet_volume_stats_used_bytes{namespace=~\"$namespace\"} / kubelet_volume_stats_capacity_bytes{namespace=~\"$namespace\"}) * 100",
              "instant": true,
              "refId": "A",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}"
            }
          ]
        },
        {
          "id": 20,
          "title": "Pod Status Table",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "prometheus", "uid": "victoriametrics" },
          "options": {
            "sortBy": [{ "displayName": "Restarts (1h)", "desc": true }],
            "cellHeight": "sm",
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": { "custom": { "filterable": true } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Phase" },
                "properties": [
                  {
                    "id": "custom.displayMode",
                    "value": "color-background"
                  },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "Running": { "color": "green", "index": 0 } } },
                      { "type": "value", "options": { "Pending": { "color": "yellow", "index": 1 } } },
                      { "type": "value", "options": { "Failed": { "color": "red", "index": 2 } } },
                      { "type": "value", "options": { "Succeeded": { "color": "blue", "index": 3 } } }
                    ]
                  }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Restarts (1h)" },
                "properties": [
                  { "id": "custom.displayMode", "value": "color-background" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "transparent", "value": null },
                        { "color": "yellow", "value": 1 },
                        { "color": "red", "value": 5 }
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "transformations": [
            {
              "id": "merge",
              "options": {}
            },
            {
              "id": "organize",
              "options": {
                "renameByName": {
                  "namespace": "Namespace",
                  "pod": "Pod",
                  "phase": "Phase",
                  "Value #A": "Phase",
                  "Value #B": "Restarts (1h)"
                }
              }
            }
          ],
          "targets": [
            {
              "expr": "kube_pod_status_phase{namespace=~\"$namespace\",phase=~\"Running|Pending|Failed\"} == 1",
              "instant": true,
              "refId": "A",
              "legendFormat": "{{namespace}} | {{pod}} | {{phase}}",
              "format": "table"
            },
            {
              "expr": "sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}[1h]))",
              "instant": true,
              "refId": "B",
              "format": "table"
            }
          ]
        }
      ]
    }
