fullnameOverride: grafana

# Admin password is auto-generated and stored in secret 'grafana' (key: admin-password).
# Retrieve with:
#   kubectl get secret -n observability grafana -o jsonpath='{.data.admin-password}' | base64 -d
adminUser: admin

persistence:
  enabled: true
  size: 2Gi
  storageClass: longhorn

# Slack token injected from sealed secret (grafana-slack).
# Mark optional so Grafana starts even before the secret is created.
envValueFrom:
  GF_SLACK_TOKEN:
    secretKeyRef:
      name: grafana-slack
      key: slack-token
      optional: true

grafana.ini:
  server:
    root_url: https://grafana.talos-cluster.local.obleey.com
  analytics:
    check_for_updates: false
  unified_alerting:
    enabled: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        uid: victoriametrics
        url: http://victoriametrics-victoria-metrics-single-server.observability.svc.cluster.local:8428
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc.cluster.local:3100
        editable: false
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "traceID=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.observability.svc.cluster.local:3100
        editable: false
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          serviceMap:
            datasourceUid: victoriametrics

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        type: file
        disableDeletion: true
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: VictoriaMetrics
    kubernetes-dashboard:
      gnetId: 15661
      revision: 2
      datasource: VictoriaMetrics

# Sidecar watches ConfigMaps with label grafana_dashboard: "1" for dynamic dashboard loading
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: ALL

alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: Slack
        receivers:
          - uid: slack-main
            type: slack
            settings:
              recipient: "#monitoring"
              token: ${GF_SLACK_TOKEN}
            disableResolveMessage: false

  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: Slack
        group_by:
          - grafana_folder
          - alertname
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h

  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: Kubernetes
        folder: Kubernetes
        interval: 1m
        rules:
          - uid: k8s-node-not-ready
            title: Node Not Ready
            condition: A
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: count(kube_node_status_condition{condition="Ready",status="true"} == 0)
                  instant: true
                  refId: A
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: A cluster node has been not ready for 5 minutes
            labels:
              severity: critical
            isPaused: false

          - uid: k8s-pod-crashlooping
            title: Pod CrashLooping
            condition: A
            data:
              - refId: A
                relativeTimeRange:
                  from: 900
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
                  instant: true
                  refId: A
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: Pod has restarted more than 3 times in 15 minutes
            labels:
              severity: warning
            isPaused: false

          - uid: k8s-high-node-cpu
            title: High Node CPU
            condition: A
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle",job="node-exporter"}[5m]))) * 100 > 90
                  instant: true
                  refId: A
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: Node CPU usage above 90% for 5 minutes
            labels:
              severity: warning
            isPaused: false

          - uid: k8s-high-node-memory
            title: High Node Memory
            condition: A
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (1 - node_memory_MemAvailable_bytes{job="node-exporter"} / node_memory_MemTotal_bytes{job="node-exporter"}) * 100 > 90
                  instant: true
                  refId: A
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: Node memory usage above 90% for 5 minutes
            labels:
              severity: warning
            isPaused: false

          - uid: k8s-pvc-almost-full
            title: PVC Almost Full
            condition: A
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: victoriametrics
                model:
                  expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 85
                  instant: true
                  refId: A
            noDataState: OK
            execErrState: Error
            for: 5m
            annotations:
              summary: PVC is more than 85% full
            labels:
              severity: warning
            isPaused: false

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
