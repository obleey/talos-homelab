apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-logs-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Kubernetes"
data:
  k8s-logs.json: |
    {
      "uid": "k8s-logs-custom",
      "title": "Kubernetes Logs",
      "description": "Pod logs filtered by namespace and deployment",
      "tags": ["kubernetes", "logs", "custom"],
      "schemaVersion": 39,
      "version": 4,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 0,
      "annotations": { "list": [] },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "victoriametrics" },
            "query": { "query": "label_values(kube_namespace_status_phase, namespace)", "refId": "A" },
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "refresh": 2,
            "sort": 1,
            "current": {}
          },
          {
            "name": "deployment",
            "label": "Deployment",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "victoriametrics" },
            "query": { "query": "label_values(kube_deployment_status_replicas{namespace=~\"$namespace\"}, deployment)", "refId": "A" },
            "includeAll": true,
            "allValue": ".+",
            "multi": false,
            "refresh": 2,
            "sort": 1,
            "current": {}
          },
          {
            "name": "level",
            "label": "Level",
            "type": "custom",
            "query": "error,warn,info,debug,fatal",
            "options": [
              { "text": "error", "value": "(?i)error" },
              { "text": "warn",  "value": "(?i)warn" },
              { "text": "info",  "value": "(?i)info" },
              { "text": "debug", "value": "(?i)debug" },
              { "text": "fatal", "value": "(?i)fatal" }
            ],
            "includeAll": true,
            "allValue": ".*",
            "multi": false,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Logs  —  $namespace / $deployment",
          "type": "logs",
          "gridPos": { "h": 25, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "loki", "uid": "loki" },
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": true,
            "wrapLogMessage": false,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          },
          "targets": [
            {
              "expr": "{namespace=~\"$namespace\", pod=~\"$deployment.*\"} |~ \"$level\"",
              "refId": "A",
              "queryType": "range",
              "maxLines": 500
            }
          ]
        }
      ]
    }
