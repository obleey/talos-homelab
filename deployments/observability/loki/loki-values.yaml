deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    max_cache_freshness_per_query: 10m
    split_queries_by_interval: 15m
    query_timeout: 300s
    volume_enabled: true

singleBinary:
  replicas: 1
  persistence:
    storageClass: longhorn
    size: 10Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

# Disable SimpleScalable components
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

# Disable nginx gateway — Alloy and Grafana write/read directly to Loki
gateway:
  enabled: false

# Disable memcached caches (not needed for single-node homelab)
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable canary and helm test
lokiCanary:
  enabled: false
test:
  enabled: false
