apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: loki
  namespace: observability
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - loki.talos-cluster.local.obleey.com
  rules:
    - backendRefs:
        - name: loki
          port: 3100
