# VictoriaMetrics k8s stack — metrics + logs + traces + Grafana

# Release "victoria-metrics" + chart "victoria-metrics-k8s-stack" would exceed
# the 63-char Service name limit; fullnameOverride keeps chart-level names short.
fullnameOverride: "vm"

# ── Metrics ──────────────────────────────────────────────────────────────────
vmsingle:
  enabled: true
  spec:
    retentionPeriod: "30d"
    storage:
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

vmagent:
  enabled: true
  rbac:
    namespaced: false
  spec:
    selectAllByDefault: true
    scrapeInterval: 30s

# ── Logs ─────────────────────────────────────────────────────────────────────
vlsingle:
  enabled: true
  spec:
    retentionPeriod: "30d"
    storage:
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

vlagent:
  enabled: true
  rbac:
    namespaced: false
  spec:
    k8sCollector:
      enabled: true

# ── Traces ───────────────────────────────────────────────────────────────────
vtsingle:
  enabled: true
  spec:
    retentionPeriod: "30d"
    storage:
      storageClassName: longhorn
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

# ── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  plugins:
    - victoriametrics-metrics-datasource
    - victoriametrics-logs-datasource

# ── Alerting ─────────────────────────────────────────────────────────────────
# alertmanager and vmalert are enabled by default; default config routes everything
# to a "blackhole" receiver (silent). Wire up receivers here when ready.
alertmanager:
  enabled: true

vmalert:
  enabled: true
