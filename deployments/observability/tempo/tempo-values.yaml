fullnameOverride: tempo

tempo:
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi

persistence:
  enabled: true
  size: 10Gi
  storageClass: longhorn

service:
  type: ClusterIP

serviceMonitor:
  enabled: false
