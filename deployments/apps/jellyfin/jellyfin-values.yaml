podPrivileges:
  hostNetwork: true

dnsPolicy: ClusterFirstWithHostNet

nodeSelector:
  kubernetes.io/hostname: talos-0z8-aw8

persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: local-path
  media:
    enabled: false
  cache:
    enabled: false

volumes:
  - name: media
    nfs:
      server: 10.0.0.23
      path: /serve/starr-stack/data/media

volumeMounts:
  - name: media
    mountPath: /data/media

httpRoute:
  enabled: false

service:
  type: ClusterIP
  port: 8096
