podPrivileges:
  hostNetwork: true

dnsPolicy: ClusterFirstWithHostNet

nodeSelector:
  kubernetes.io/hostname: talos-worker-1

persistence:
  config:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: longhorn # /config → Longhorn
  media:
    enabled: false
  cache:
    enabled: false

volumes:
  - name: nfs-media
    nfs:
      server: 10.0.0.23
      path: /serve/starr-stack/data/media
  - name: transcode
    persistentVolumeClaim:
      claimName: jellyfin-transcode
  - name: cache
    persistentVolumeClaim:
      claimName: jellyfin-cache

volumeMounts:
  - name: nfs-media
    mountPath: /data/media
  - name: transcode
    mountPath: /transcode
  - name: cache
    mountPath: /cache

httpRoute:
  enabled: false

service:
  type: ClusterIP
  port: 8096
