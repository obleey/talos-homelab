fullnameOverride: jellyfin

controllers:
  main:
    type: deployment
    strategy: Recreate
    pod:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: talos-worker-1
    containers:
      main:
        image:
          repository: jellyfin/jellyfin
          tag: "10.11.11.20260606-153911"
        env:
          TZ: Europe/Ljubljana

service:
  app:
    controller: main
    ports:
      http:
        port: 8096

persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: jellyfin-config
    globalMounts:
      - path: /config
  cache:
    type: persistentVolumeClaim
    existingClaim: jellyfin-cache
    globalMounts:
      - path: /cache
  media:
    type: nfs
    server: 10.0.0.104
    path: /mnt/serve/starr-stack/data/media
    globalMounts:
      - path: /data/media

route:
  app:
    parentRefs:
      - name: traefik-gateway
        namespace: traefik
        sectionName: websecure
    hostnames:
      - jellyfin.talos-cluster.local.obleey.com
    rules:
      - backendRefs:
          - name: jellyfin
            port: 8096
