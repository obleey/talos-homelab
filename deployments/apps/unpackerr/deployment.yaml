apiVersion: apps/v1
kind: Deployment
metadata:
  name: unpackerr
  namespace: servarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unpackerr
  template:
    metadata:
      labels:
        app: unpackerr
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: unpackerr
          image: golift/unpackerr
          env:
            - name: TZ
              value: Europe/Ljubljana
            - name: UN_LOG_FILE
              value: /data/torrents/unpackerr.log
            - name: UN_SONARR_0_URL
              value: http://sonarr.servarr.svc.cluster.local:8989
            - name: UN_SONARR_0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: unpackerr-sealedsecret
                  key: sonarr-api-key
            - name: UN_SONARR_0_PATHS_0
              value: /data/torrents
            - name: UN_RADARR_0_URL
              value: http://radarr.servarr.svc.cluster.local:7878
            - name: UN_RADARR_0_API_KEY
              valueFrom:
                secretKeyRef:
                  name: unpackerr-sealedsecret
                  key: radarr-api-key
            - name: UN_RADARR_0_PATHS_0
              value: /data/torrents
            - name: UN_PARALLEL
              value: "1"
            - name: UN_FILE_MODE
              value: "0644"
            - name: UN_DIR_MODE
              value: "0755"
          volumeMounts:
            - name: torrents
              mountPath: /data/torrents
      volumes:
        - name: torrents
          nfs:
            server: 10.0.0.23
            path: /serve/starr-stack/data/torrents
