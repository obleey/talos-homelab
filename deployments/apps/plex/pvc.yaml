apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-cache
  namespace: servarr # 👈 THIS is the fix
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-transcode
  namespace: servarr # 👈 THIS too
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
