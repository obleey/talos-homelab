pms:
  storageClassName: longhorn
  configStorage: 20Gi

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

nodeSelector:
  kubernetes.io/hostname: talos-worker-1

rclone:
  enabled: false

extraVolumes:
  - name: servarr-data
    nfs:
      server: 10.0.0.104
      path: /mnt/serve/starr-stack/data
  - name: plex-cache
    storageClassName: longhorn
    persistentVolumeClaim:
      claimName: plex-cache
  - name: plex-transcode
    storageClassName: longhorn
    persistentVolumeClaim:
      claimName: plex-transcode

extraVolumeMounts:
  - name: servarr-data
    mountPath: /data
  - name: plex-cache
    mountPath: /caches
  - name: plex-transcode
    mountPath: /transcodes

extraEnv:
  HOSTNAME: talos-plex

service:
  type: ClusterIP
  port: 32400
