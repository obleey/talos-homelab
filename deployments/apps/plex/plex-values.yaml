pms:
  storageClassName: local-path
  configStorage: 20Gi

hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

nodeSelector:
  kubernetes.io/hostname: talos-worker-1

rclone:
  enabled: false

extraVolumes:
  - name: servarr-data
    nfs:
      server: 10.0.0.23
      path: /serve/starr-stack/data

extraVolumeMounts:
  - name: servarr-data
    mountPath: /data

extraEnv:
  HOSTNAME: talos-plex

service:
  type: ClusterIP
  port: 32400
