apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: servarr-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: autopulse
          - name: bazarr
          - name: byparr
          - name: clonarr
          - name: jellyfin
          - name: plex
          - name: prowlarr
          - name: qbittorrent
          - name: radarr
          - name: scraparr
          - name: seerr
          - name: sonarr
          - name: unpackerr
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      labels:
        argocd.argoproj.io/managed-by: talos-cluster
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        - repoURL: https://bjw-s-labs.github.io/helm-charts
          chart: app-template
          targetRevision: 5.0.1
          helm:
            valueFiles:
              - "$values/deployments/apps/{{.name}}/{{.name}}-values.yaml"
        - repoURL: https://github.com/obleey/talos-homelab
          targetRevision: HEAD
          ref: values
          path: "deployments/apps/{{.name}}"
          directory:
            exclude: "{app.yaml,{{.name}}-values.yaml}"
      destination:
        server: https://kubernetes.default.svc
        namespace: servarr
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
