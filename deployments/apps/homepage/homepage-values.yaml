image:
  repository: ghcr.io/gethomepage/homepage
  tag: v1.13.2
enableRbac: true

serviceAccount:
  name: homepage
  create: true

service:
  main:
    ports:
      http:
        port: 3000

controller:
  strategy: Recreate

env:
  - name: HOMEPAGE_ALLOWED_HOSTS
    value: "hub.talos-cluster.local.obleey.com"
  - name: TZ
    value: "Europe/Ljubljana"
envFrom:
  - secretRef:
      name: homepage-secrets
  - secretRef:
      name: homepage-observability-secrets
      optional: true

persistence:
  logs:
    enabled: true
    type: pvc
    mountPath: /app/config/logs
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi

config:
  kubernetes:
    mode: cluster
    gateway: true

  settingsString: |
    title: Talos Homelab
    theme: dark
    color: slate
    headerStyle: clean
    hideErrors: true
    providers:
      longhorn:
        url: https://longhorn.talos-cluster.local.obleey.com
    layout:
      Infrastructure:
        style: row
        columns: 6
      Observability:
        style: row
        columns: 2
      Media Servers:
        style: row
        columns: 2
      Media Management:
        style: row
        columns: 6
      Downloads:
        style: row
        columns: 2

  bookmarks:
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/obleey
              icon: github.png
        - Talos Homelab:
            - abbr: TH
              href: https://github.com/obleey/talos-homelab
              icon: github.png

  widgets:
    - greeting:
        text_size: xl
        text: Welcome back, Obleey!
    - search:
        provider: duckduckgo
        target: _blank
        focus: false
    - datetime:
        text_size: xl
        locale: sl-SI
        format:
          timeStyle: short
          dateStyle: short
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: talos-cluster
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - longhorn:
        url: https://longhorn.talos-cluster.local.obleey.com
        expanded: true
        total: true
        labels: true
        nodes: true

  services:
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.talos-cluster.local.obleey.com
            description: GitOps controller
            widget:
              type: argocd
              url: https://argocd.talos-cluster.local.obleey.com
              key: "{{HOMEPAGE_VAR_ARGOCD_TOKEN}}"
        - Traefik:
            icon: traefik.png
            href: https://traefik.talos-cluster.local.obleey.com/dashboard/
            description: Gateway & ingress
            widget:
              type: traefik
              url: http://traefik.traefik.svc.cluster.local:9000
        - Longhorn:
            icon: longhorn.png
            href: https://longhorn.talos-cluster.local.obleey.com
            description: Distributed storage
        - Kubeseal:
            icon: kubernetes.png
            href: https://kubeseal.talos-cluster.local.obleey.com
            description: Sealed secrets UI
        - Technitium:
            icon: technitium.png
            href: https://technitium.local.obleey.com
            description: DNS server
        - TrueNAS:
            icon: truenas.png
            href: https://truenas.local.obleey.com
            description: Network storage

    - Observability:
        - Grafana:
            icon: grafana.png
            href: https://grafana.talos-cluster.local.obleey.com
            description: Dashboards & alerts
            widget:
              type: grafana
              url: https://grafana.talos-cluster.local.obleey.com
              username: "{{HOMEPAGE_VAR_GRAFANA_USERNAME}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
        - VictoriaMetrics:
            icon: victoriametrics.png
            href: https://vm.talos-cluster.local.obleey.com/vmui
            description: Metrics storage

    - Media Servers:
        - Plex:
            icon: plex.png
            href: https://app.plex.tv
            description: Media server
            widget:
              type: plex
              url: http://10.0.0.161:32400
              key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
        - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.talos-cluster.local.obleey.com
            description: Media server
            widget:
              type: jellyfin
              url: https://jellyfin.talos-cluster.local.obleey.com
              key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
              enableBlocks: true
              enableNowPlaying: true

    - Media Management:
        - Radarr:
            icon: radarr.png
            href: https://radarr.talos-cluster.local.obleey.com
            description: Movies
            widget:
              type: radarr
              url: http://radarr.servarr.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
        - Sonarr:
            icon: sonarr.png
            href: https://sonarr.talos-cluster.local.obleey.com
            description: TV shows
            widget:
              type: sonarr
              url: http://sonarr.servarr.svc.cluster.local:8989
              key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
        - Prowlarr:
            icon: prowlarr.png
            href: https://prowlarr.talos-cluster.local.obleey.com
            description: Indexers
            widget:
              type: prowlarr
              url: http://prowlarr.servarr.svc.cluster.local:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
        - Bazarr:
            icon: bazarr.png
            href: https://bazarr.talos-cluster.local.obleey.com
            description: Subtitles
            widget:
              type: bazarr
              url: http://bazarr.servarr.svc.cluster.local:6767
              key: "{{HOMEPAGE_VAR_BAZARR_API_KEY}}"
        - Seerr:
            icon: seerr.png
            href: https://seerr.talos-cluster.local.obleey.com
            description: Media requests
            widget:
              type: seerr
              url: http://seerr.servarr.svc.cluster.local:5055
              key: "{{HOMEPAGE_VAR_SEERR_API_KEY}}"
        - Clonarr:
            icon: https://clonarr.talos-cluster.local.obleey.com/icons/clonarr.png
            href: https://clonarr.talos-cluster.local.obleey.com
            description: Trash Guides sync

    - Downloads:
        - qBittorrent:
            icon: qbittorrent.png
            href: https://qb.talos-cluster.local.obleey.com
            description: Torrent client
            widget:
              type: qbittorrent
              url: http://qbittorrent.servarr.svc.cluster.local:8080
              username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
              password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"
        - Unpackerr:
            icon: unpackerr.png
            href: https://github.com/Unpackerr/unpackerr
            description: Archive extractor
