apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talos-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/obleey/talos-homelab
    targetRevision: HEAD
    path: deployments
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    - group: argoproj.io
      kind: Application
      jsonPointers:
        - /metadata/annotations/argocd.argoproj.io~1tracking-id
  syncPolicy:
    syncOptions:
      - RespectIgnoreDifferences=true
    # automated:
    #   prune: true
    #   selfHeal: true
