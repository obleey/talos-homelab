# bootstrap/talos-cluster.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: talos-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/obleey/talos-homelab
    targetRevision: HEAD
    path: deployments/infrastructure
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy: {}
