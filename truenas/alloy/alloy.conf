// ============================================================
// Host metrics (node exporter)
// ============================================================

prometheus.exporter.unix "truenas" {
  procfs_path = "/host/proc"
  sysfs_path  = "/host/sys"
  rootfs_path = "/rootfs"
}

discovery.relabel "truenas_host" {
  targets = prometheus.exporter.unix.truenas.targets

  rule {
    target_label = "instance"
    replacement  = "truenas"
  }
  rule {
    target_label = "job"
    replacement  = "node-exporter"
  }
}

prometheus.scrape "truenas_host" {
  targets         = discovery.relabel.truenas_host.output
  forward_to      = [prometheus.remote_write.default.receiver]
  scrape_interval = "60s"
}

// ============================================================
// cAdvisor — Docker container metrics (built-in)
// ============================================================

prometheus.exporter.cadvisor "truenas" {
  docker_only = true
}

discovery.relabel "cadvisor" {
  targets = prometheus.exporter.cadvisor.truenas.targets

  rule {
    target_label = "job"
    replacement  = "cadvisor"
  }
  rule {
    target_label = "instance"
    replacement  = "truenas"
  }
}

prometheus.scrape "cadvisor" {
  targets         = discovery.relabel.cadvisor.output
  forward_to      = [prometheus.remote_write.default.receiver]
  scrape_interval = "30s"
}

// ============================================================
// Docker container logs
// ============================================================

discovery.docker "containers" {
  host = "unix:///var/run/docker.sock"
}

discovery.relabel "docker_logs" {
  targets = discovery.docker.containers.targets

  rule {
    source_labels = ["__meta_docker_container_name"]
    regex         = "/(.*)"
    target_label  = "container"
  }
  rule {
    source_labels = ["__meta_docker_container_image"]
    target_label  = "image"
  }
  rule {
    target_label = "host"
    replacement  = "truenas"
  }
  rule {
    source_labels = ["__meta_docker_container_name"]
    regex         = "/(.*)"
    replacement   = "truenas/$1"
    target_label  = "job"
  }
}

loki.source.docker "containers" {
  host       = "unix:///var/run/docker.sock"
  targets    = discovery.relabel.docker_logs.output
  forward_to = [loki.write.default.receiver]
}

